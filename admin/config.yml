backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "settings"
    label: "Parlem Flores"
    files:
      - name: "data"
        label: "Datos del sitio"
        file: "data.json"
        format: "json"
        fields:
          - label: "Sitio"
            name: "site"
            widget: "object"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Eslogan", name: "tagline", widget: "string" }
              - { label: "Título principal", name: "hero_title", widget: "string" }
              - { label: "Subtítulo principal", name: "hero_subtitle", widget: "text" }
              - { label: "Imagen principal", name: "hero_image", widget: "image", required: false }
              - { label: "Nombre florista", name: "about_name", widget: "string" }
              - { label: "Texto historia", name: "about_text", widget: "text" }
              - { label: "Dirección", name: "address", widget: "string" }
              - { label: "Teléfono", name: "phone", widget: "string" }
              - { label: "WhatsApp", name: "whatsapp", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "Horario", name: "hours", widget: "string" }
              - { label: "Información de entrega", name: "delivery_info", widget: "string" }
              - { label: "Barra superior", name: "top_bar_text", widget: "string" }
              - { label: "Insignia principal", name: "hero_badge", widget: "string", required: false }
              - { label: "Texto bodas", name: "wedding_text", widget: "text", required: false }
          - label: "Flores de temporada"
            name: "seasonal"
            widget: "list"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Emoji", name: "emoji", widget: "string", required: false }
          - label: "Categorías"
            name: "categories"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Icono", name: "icon", widget: "string", required: false }
          - label: "Productos"
            name: "products"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int" }
              - label: "Categoría"
                name: "category"
                widget: "select"
                options:
                  - { label: "Ramos y Bouquets", value: "ramos-bouquets" }
                  - { label: "Centros de Flores", value: "centros-flores" }
                  - { label: "Centros de Cementerio", value: "centros-cementerio" }
                  - { label: "Cestas y Ramos Secos", value: "cestas-ramos-secos" }
                  - { label: "Flores Preservadas", value: "flores-preservadas" }
                  - { label: "Jarrones", value: "jarrones" }
                  - { label: "Plantas", value: "plantas" }
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }
              - { label: "Precio desde", name: "price", widget: "number", value_type: "float" }
              - { label: "Precio hasta", name: "price_max", widget: "number", value_type: "float", required: false }
              - { label: "Etiqueta de precio", name: "price_label", widget: "string", required: false }
              - { label: "Imagen", name: "image", widget: "image", required: false }
              - { label: "Badge", name: "badge", widget: "string", required: false }
              - { label: "Disponible en la web", name: "available", widget: "boolean", default: true }
          - label: "Testimonios"
            name: "testimonials"
            widget: "list"
            required: false
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Texto", name: "text", widget: "text" }
              - { label: "Estrellas", name: "stars", widget: "number", value_type: "int", default: 5 }
              - { label: "Fuente", name: "source", widget: "string", required: false }
