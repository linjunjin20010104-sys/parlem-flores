backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "settings"
    label: "Configuración"
    files:
      - name: "data"
        label: "Datos del Sitio"
        file: "data.json"
        fields:
          - {label: "Nombre del Sitio", name: "name", widget: "string"}
          - {label: "Eslogan", name: "tagline", widget: "string"}
          - {label: "Teléfono", name: "phone", widget: "string"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string"}
          - label: "Productos"
            name: "products"
            widget: "list"
            fields:
              - {label: "Nombre", name: "name", widget: "string"}
              - {label: "Descripción", name: "description", widget: "text"}
              - {label: "Precio Mínimo", name: "price", widget: "number"}
              - {label: "Precio Máximo", name: "price_max", widget: "number"}
              - {label: "Imagen", name: "image", widget: "image", required: false}
