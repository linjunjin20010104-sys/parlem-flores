<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Parlem Flores · Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f6f1ec;color:#241d19;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .card{width:min(460px,100%);background:white;border:1px solid #e7ddd4;border-radius:10px;padding:30px;box-shadow:0 12px 40px rgba(56,40,30,.08)}
    .logo{text-align:center;color:#7f1f28;font-family:Georgia,serif;font-size:30px;margin-bottom:8px}
    h1{text-align:center;font-size:20px;margin-bottom:8px}
    p{color:#75685f;font-size:14px;line-height:1.55;text-align:center;margin-bottom:22px}
    .actions{display:grid;gap:10px}
    a{display:flex;align-items:center;justify-content:center;text-decoration:none;border-radius:7px;padding:12px 14px;font-weight:700}
    .primary{background:#7f1f28;color:white}
    .secondary{border:1px solid #ddd1c7;color:#241d19;background:white}
    .note{font-size:12px;margin:18px 0 0;color:#9b8e85}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">✿</div>
    <h1>Parlem Flores Admin</h1>
    <p>Usa el acceso con cuenta de Netlify para gestionar productos, fotos y textos. El acceso con token queda como respaldo.</p>
    <div class="actions">
      <a class="primary" href="/admin/cms.html">Entrar con cuenta</a>
      <a class="secondary" href="/admin/token.html">Entrar con token</a>
    </div>
    <p class="note">Si el acceso con cuenta no abre, activa Identity y Git Gateway en Netlify.</p>
  </main>
</body>
</html>
